<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | My App Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="sub-page">
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">MY APP STUDIO</a></div>
        </nav>
    </header>

    <main class="page-container glass-card">
        <h1>サポート & お問い合わせ</h1>
        <p>アプリに関するお問い合わせは、以下の各種 SNS の DM にて受け付けております。</p>
        
        <div class="contact-card">
            <div class="sns-support-links">
                <a href="https://www.instagram.com/あなたのID" class="btn btn-outline" target="_blank">Instagram</a>
                <a href="https://www.tiktok.com/@あなたのID" class="btn btn-outline" target="_blank">TikTok</a>
                <a href="https://twitter.com/あなたのID" class="btn btn-outline" target="_blank">X (Twitter)</a>
            </div>
            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-dim);">※返信にはお時間をいただく場合がございます。あらかじめご了承ください。</p>
        </div>

        <div style="margin-top: 50px;">
            <a href="index.html" class="btn btn-outline">ホームへ戻る</a>
        </div>
    </main>

    <style>
        .sub-page main { padding-top: 151px; }
        .page-container { max-width: 800px; margin: 0 auto 100px; padding: 60px; }
        h1 { margin-bottom: 30px; text-align: center; }
        .contact-card { padding: 40px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); text-align: center; }
        .sns-support-links { display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto; }
        .sns-support-links .btn { width: 100%; }
        h2 { margin: 40px 0 20px; color: var(--accent-blue); }
    </style>
</body>
</html>
