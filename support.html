<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | My App Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="sub-page">
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">MY APP STUDIO</a></div>
        </nav>
    </header>

    <main class="page-container glass-card">
        <h1>サポート & お問い合わせ</h1>
        <p>アプリの不具合報告、機能要望、その他のお問い合わせはこちらからお願いします。</p>
        
        <div class="contact-card">
            <p>現在、お問い合わせは以下のメールアドレス、または SNS にて受け付けております。</p>
            <p style="font-size: 1.2rem; color: var(--accent-purple); margin: 20px 0;">support@example.com</p>
            <p>※返信には数日お時間をいただく場合がございます。</p>
        </div>

        <section style="margin-top: 40px;">
            <h2>よくある質問 (FAQ)</h2>
            <div class="faq-item">
                <h3>Q. データはバックアップされますか？</h3>
                <p>A. 現在、すべてのデータはデバイス内に保存されています。iCloud 同期機能は将来のアップデートで検討中です。</p>
            </div>
        </section>
        
        <div style="margin-top: 50px;">
            <a href="index.html" class="btn btn-outline">ホームへ戻る</a>
        </div>
    </main>

    <style>
        .sub-page main { padding-top: 151px; }
        .page-container { max-width: 800px; margin: 0 auto 100px; padding: 60px; }
        h1 { margin-bottom: 30px; }
        .contact-card { padding: 30px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); text-align: center; }
        h2 { margin: 40px 0 20px; color: var(--accent-blue); }
        .faq-item h3 { font-size: 1.1rem; margin-bottom: 10px; color: #fff; }
        .faq-item p { margin-bottom: 20px; color: var(--text-dim); }
    </style>
</body>
</html>
